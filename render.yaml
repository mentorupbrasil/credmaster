# =============================================================================
#  Blueprint de deploy da API CredMaster (container Docker) no Render.
#  - Conecta no mesmo GitHub e usa o Neon como banco.
#  - O Dockerfile roda `prisma migrate deploy` no start (aplica a migration).
#  Passos: Render -> New -> Blueprint -> aponte para este repositório.
#  Depois preencha as variáveis marcadas com `sync: false` no painel.
# =============================================================================
services:
  - type: web
    name: credmaster-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Neon (use o pooler na DATABASE_URL e a conexão direta na DIRECT_URL).
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      # Segredos JWT gerados automaticamente pelo Render.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: "900"
      - key: JWT_REFRESH_TTL
        value: "2592000"
      # Domínio do front no Vercel (ex.: https://credmaster.vercel.app).
      - key: CORS_ORIGINS
        sync: false
      - key: WEB_URL
        sync: false
      - key: TIMEZONE
        value: America/Sao_Paulo
      - key: COBRANCA_CRON
        value: "5 0 * * *"
      - key: MAIL_FROM
        value: no-reply@credmaster.local
