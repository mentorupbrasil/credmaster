# Ambiente local opcional. Em produção usamos o Neon (serverless Postgres).
# Útil para rodar testes/integração sem depender da internet.
services:
  postgres:
    image: postgres:16-alpine
    container_name: credmaster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: credmaster
      POSTGRES_PASSWORD: credmaster
      POSTGRES_DB: credmaster
    ports:
      - "5432:5432"
    volumes:
      - credmaster_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credmaster"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: credmaster-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  credmaster_pg:
